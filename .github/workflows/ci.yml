name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      # ── Secret / sensitive-file scanning ──────────────────────────────────
      - name: Check for committed .env files
        run: |
          echo "🔍 Scanning for committed .env files..."
          if git ls-files | grep -E '(^|/)\.env($|\.)' | grep -v '\.env\.example'; then
            echo "❌ FAIL: .env file(s) detected in the repository!"
            echo "   Remove them and rotate any exposed keys immediately."
            echo "   See SECURITY.md §1.1 for key rotation instructions."
            exit 1
          fi
          echo "✅ No .env files found."

      - name: Scan for secret patterns
        run: |
          echo "🔍 Scanning for hardcoded secret patterns..."
          FAIL=0

          # Patterns to detect (case-insensitive grep across tracked files)
          SECRET_PATTERNS=(
            'SUPABASE_SERVICE_ROLE_KEY\s*=\s*ey'
            'service_role.*ey[A-Za-z0-9_-]{20,}'
            'sk_live_[A-Za-z0-9]{24,}'
            'PRIVATE_KEY\s*=\s*.'
            'BEGIN (RSA |EC |OPENSSH )?PRIVATE KEY'
          )

          for pattern in "${SECRET_PATTERNS[@]}"; do
            HITS=$(git ls-files | xargs grep -rlEi "$pattern" 2>/dev/null \
              | grep -v 'node_modules' \
              | grep -v '\.md$' \
              | grep -v 'SECURITY\.md' \
              | grep -v 'ci\.yml' \
              | grep -v 'CONTRIBUTING\.md' || true)
            if [ -n "$HITS" ]; then
              echo "❌ Potential secret pattern '$pattern' found in:"
              echo "$HITS"
              FAIL=1
            fi
          done

          if [ "$FAIL" -eq 1 ]; then
            echo ""
            echo "💡 Rotate any exposed keys (see SECURITY.md §1.1) then remove from code."
            exit 1
          fi
          echo "✅ No secret patterns detected."

      # ── Node / Bun setup ──────────────────────────────────────────────────
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # ── Code quality checks ───────────────────────────────────────────────
      - name: TypeScript type check
        run: bun run tsc --noEmit

      # Run ESLint once with JSON output for accurate counting + a human-readable
      # stylish report for log inspection. We never `grep` for the word "error"
      # (that matched unrelated lines like "0 errors" and "error: script ...").
      - name: ESLint — run and capture report
        id: eslint
        run: |
          set +e
          bun run lint --format json --output-file eslint-report.json
          ESLINT_EXIT=$?
          set -e
          echo "eslint_exit=$ESLINT_EXIT" >> "$GITHUB_OUTPUT"
          echo "::group::ESLint stylish report"
          bunx eslint . || true
          echo "::endgroup::"
          ls -la eslint-report.json

      - name: ESLint — diagnostics (top rules & files)
        run: |
          echo "📊 Top 15 rules by error count:"
          jq -r '[.[].messages[] | select(.severity == 2) | .ruleId] 
                 | group_by(.) | map({rule: .[0], count: length}) 
                 | sort_by(-.count) | .[:15] 
                 | .[] | "  \(.count)\t\(.rule)"' eslint-report.json || true

          echo ""
          echo "📁 Top 15 files by error count:"
          jq -r '[.[] | select(.errorCount > 0) | {file: .filePath, count: .errorCount}] 
                 | sort_by(-.count) | .[:15] 
                 | .[] | "  \(.count)\t\(.file)"' eslint-report.json || true

      - name: ESLint regression guard
        env:
          BASELINE: "173"
        run: |
          ERRORS=$(jq '[.[].errorCount] | add // 0' eslint-report.json)
          WARNINGS=$(jq '[.[].warningCount] | add // 0' eslint-report.json)

          echo "──────────────────────────────────────────"
          echo "  Baseline: $BASELINE"
          echo "  Current:  $ERRORS errors, $WARNINGS warnings"
          echo "──────────────────────────────────────────"

          if [ "$ERRORS" -gt "$BASELINE" ]; then
            DIFF=$((ERRORS - BASELINE))
            echo "::error::Status: FAIL — ESLint errors increased by $DIFF (current: $ERRORS, baseline: $BASELINE). Fix new issues before merging."
            exit 1
          fi

          if [ "$ERRORS" -lt "$BASELINE" ]; then
            echo "::notice::🎉 Status: PASS — ESLint errors reduced by $((BASELINE - ERRORS)). Consider lowering BASELINE in ci.yml to $ERRORS to lock in the improvement."
          else
            echo "✅ Status: PASS — ESLint errors at baseline ($BASELINE)."
          fi

      # ── Build ─────────────────────────────────────────────────────────────
      - name: Build
        run: bun run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.placeholder' }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID || 'placeholder' }}

      - name: Build size report
        run: |
          echo "📦 Build output:"
          du -sh dist/ 2>/dev/null || echo "(dist folder not found)"
          ls -lh dist/ 2>/dev/null || true

  # ── Unit tests (runs if test files exist) ─────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: quality-gate

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run unit tests
        run: bun run test --run 2>/dev/null || echo "ℹ️  No test runner configured yet — skipping."
